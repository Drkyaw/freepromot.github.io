<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <title>Ayar Yar - AI Prompts</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Poppins:wght@600;700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

  <style>
    :root {
      --md-sys-color-background: #000000;
      --md-sys-color-on-background: #E6E1E5;
      --md-sys-color-surface-container: #1C1B1F;
      --md-sys-color-surface-container-high: #2B2930;
      --md-sys-color-on-surface: #E6E1E5;
      --md-sys-color-on-surface-variant: #CAC4D0;
      --md-sys-color-primary: #D0BCFF;
      --md-sys-color-on-primary: #381E72;
      --md-sys-color-outline-variant: #49454F;
      --md-sys-color-tertiary: #EFB8C8;
      --md-sys-color-blue: #82B1FF;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Roboto', sans-serif; background: var(--md-sys-color-background); color: var(--md-sys-color-on-background); padding-bottom: 5rem; overflow-x: hidden; }

    /* Splash Screen */
   .splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000000;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: splashFadeOut 0.5s ease-out 2s forwards;
    }
   .splash-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      animation: splashScale 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
   .splash-icon {
      width: 100px;
      height: 100px;
      border-radius: 28px;
      background: linear-gradient(135deg, #82B1FF, #D0BCFF);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(130, 177, 255, 0.3);
      animation: splashPulse 2s ease-in-out infinite;
    }
   .splash-icon i {
      font-size: 56px;
      color: #000000;
    }
   .splash-title {
      font-family: 'Poppins', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--md-sys-color-blue);
      letter-spacing: 1px;
      text-shadow: 0 0 20px rgba(130, 177, 255, 0.5);
    }
   .splash-subtitle {
      font-size: 0.875rem;
      color: var(--md-sys-color-on-surface-variant);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
   .splash-loader {
      width: 40px;
      height: 40px;
      border: 3px solid var(--md-sys-color-surface-container-high);
      border-top: 3px solid var(--md-sys-color-blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-top: 1rem;
    }
    @keyframes splashFadeOut {
      to { opacity: 0; visibility: hidden; }
    }
    @keyframes splashScale {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    @keyframes splashPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 8px 24px rgba(130, 177, 255, 0.3); }
      50% { transform: scale(1.05); box-shadow: 0 8px 32px rgba(130, 177, 255, 0.5); }
    }

    /* Main App Styles */
   .app-bar { background: var(--md-sys-color-surface-container); padding: 1rem 1.5rem 0.5rem; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--md-sys-color-outline-variant); }
   .app-bar-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
   .app-bar h1 { font-size: 1.375rem; font-weight: 400; display: flex; align-items: center; gap: 0.75rem; }
   .icon-btn { width: 40px; height: 40px; border-radius: 20px; border: none; background: transparent; color: var(--md-sys-color-on-surface); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
   .icon-btn:active { background: var(--md-sys-color-surface-container-high); transform: scale(0.9); }
   .search-bar { display: flex; align-items: center; background: var(--md-sys-color-surface-container-high); border-radius: 28px; padding: 0.5rem 1rem; gap: 0.75rem; margin-bottom: 0.5rem; }
   .search-bar input { flex: 1; background: transparent; border: none; outline: none; color: var(--md-sys-color-on-surface); font-size: 1rem; }
   .status-bar { padding: 0.5rem 1.5rem; text-align: center; font-size: 0.75rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem; border-bottom: 1px solid var(--md-sys-color-outline-variant); }
   .status-online { background: #1B5E20; color: #C8E6C9; }
   .status-offline { background: #B71C1C; color: #FFCDD2; }
   .tabs { display: flex; background: var(--md-sys-color-surface-container); border-bottom: 1px solid var(--md-sys-color-outline-variant); position: sticky; top: 122px; z-index: 99; }
   .tab { flex: 1; padding: 0.875rem; border: none; background: transparent; color: var(--md-sys-color-on-surface-variant); font-size: 0.875rem; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; transition: 0.2s; }
   .tab.active { color: var(--md-sys-color-primary); border-bottom-color: var(--md-sys-color-primary); }
   .container { max-width: 640px; margin: 1rem auto; padding: 0 1rem; }

   .notice-card {
      background: linear-gradient(135deg, var(--md-sys-color-surface-container-high), var(--md-sys-color-surface-container));
      border: 1px solid var(--md-sys-color-primary);
      border-radius: 20px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
      animation: slideInDown 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 16px rgba(208, 188, 255, 0.15);
      position: relative;
      overflow: hidden;
    }
   .notice-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--md-sys-color-primary), var(--md-sys-color-tertiary));
    }
   .notice-header { display: flex; align-items: flex-start; gap: 0.75rem; margin-bottom: 0.75rem; }
   .notice-icon { width: 40px; height: 40px; border-radius: 20px; background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
   .notice-content { flex: 1; }
   .notice-title { font-size: 1.125rem; font-weight: 500; margin-bottom: 0.5rem; }
   .notice-message { font-size: 0.875rem; color: var(--md-sys-color-on-surface-variant); line-height: 1.6; white-space: pre-line; margin-bottom: 0.75rem; }
   .notice-close { width: 32px; height: 32px; border-radius: 16px; border: none; background: transparent; color: var(--md-sys-color-on-surface-variant); cursor: pointer; display: flex; align-items: center; justify-content: center; }
   .notice-close:active { background: var(--md-sys-color-surface-container-high); }
   .notice-btn { width: 100%; padding: 0.75rem; border-radius: 12px; border: none; background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); font-size: 0.875rem; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: 0.2s; }
   .notice-btn:active { opacity: 0.8; transform: scale(0.98); }

   .dev-card {
      background: linear-gradient(135deg, var(--md-sys-color-surface-container-high), var(--md-sys-color-surface-container));
      border: 1px solid var(--md-sys-color-outline-variant);
      border-radius: 20px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      animation: slideInDown 0.5s cubic-bezier(0.4, 0, 0.2, 1) 0.1s backwards;
    }
   .dev-avatar {
      width: 56px;
      height: 56px;
      border-radius: 28px;
      background: linear-gradient(135deg, var(--md-sys-color-primary), var(--md-sys-color-tertiary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--md-sys-color-on-primary);
    }
   .dev-info { flex: 1; }
   .dev-name { font-size: 1.125rem; font-weight: 500; margin-bottom: 0.25rem; }
   .dev-email { font-size: 0.875rem; color: var(--md-sys-color-on-surface-variant); display: flex; align-items: center; gap: 0.25rem; }

   .md-card {
      background: var(--md-sys-color-surface-container);
      border: 1px solid var(--md-sys-color-outline-variant);
      border-radius: 16px;
      margin-bottom: 1rem;
      overflow: hidden;
      position: relative;
      animation: fadeInUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) backwards;
      transition: transform 0.2s, box-shadow 0.2s;
    }
   .md-card:active { transform: scale(0.98); }
   .md-card:nth-child(1) { animation-delay: 0.05s; }
   .md-card:nth-child(2) { animation-delay: 0.1s; }
   .md-card:nth-child(3) { animation-delay: 0.15s; }
   .card-image { width: 100%; height: 200px; object-fit: cover; background: var(--md-sys-color-surface-container-high); }
   .fav-btn { position: absolute; top: 0.75rem; right: 0.75rem; width: 40px; height: 40px; border-radius: 20px; background: rgba(0,0,0,0.6); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); transition: 0.2s; }
   .fav-btn:active { transform: scale(0.8); }
   .fav-btn.active { color: #F2B8B5; animation: heartBeat 0.4s; }
   .card-content { padding: 1rem; }
   .card-title { font-size: 1.125rem; font-weight: 500; margin-bottom: 0.5rem; }
   .card-text { font-size: 0.875rem; color: var(--md-sys-color-on-surface-variant); line-height: 1.6; margin-bottom: 1rem; white-space: pre-line; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
   .card-actions { display: flex; gap: 0.5rem; padding: 0 1rem 1rem; }
   .md-button { display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.625rem 1.25rem; border-radius: 20px; border: none; background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); font-size: 0.875rem; font-weight: 500; cursor: pointer; flex: 1; transition: 0.2s; }
   .md-button:active { opacity: 0.8; transform: scale(0.96); }
   .md-button-outline { background: transparent; color: var(--md-sys-color-primary); border: 1px solid var(--md-sys-color-outline-variant); }
   .loader,.empty { text-align: center; padding: 4rem 1rem; color: var(--md-sys-color-on-surface-variant); }
   .spinner { border: 3px solid var(--md-sys-color-surface-container-high); border-top: 3px solid var(--md-sys-color-primary); border-radius: 50%; width: 48px; height: 48px; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
   .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--md-sys-color-surface-container-high); color: var(--md-sys-color-on-surface); padding: 0.875rem 1.5rem; border-radius: 4px; opacity: 0; transition: 0.3s; z-index: 1000; border: 1px solid var(--md-sys-color-outline-variant); }
   .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

   .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 200; display: none; animation: fadeIn 0.2s; }
   .modal-overlay.show { display: flex; align-items: center; justify-content: center; padding: 1rem; }
   .modal-card { background: var(--md-sys-color-surface-container); border-radius: 28px; width: 100%; max-width: 600px; max-height: 90vh; display: flex; flex-direction: column; animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
   .modal-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--md-sys-color-outline-variant); display: flex; align-items: center; justify-content: space-between; }
   .modal-title { font-size: 1.25rem; font-weight: 500; flex: 1; }
   .modal-close { width: 40px; height: 40px; border-radius: 20px; border: none; background: transparent; color: var(--md-sys-color-on-surface); cursor: pointer; display: flex; align-items: center; justify-content: center; }
   .modal-body { flex: 1; overflow-y: auto; padding: 1rem 1.5rem; }
   .modal-body img { width: 100%; border-radius: 12px; margin: 1rem 0; }
   .modal-body p { line-height: 1.7; white-space: pre-line; color: var(--md-sys-color-on-surface-variant); margin-bottom: 1rem; }
   .modal-actions { padding: 1rem 1.5rem; border-top: 1px solid var(--md-sys-color-outline-variant); display: flex; gap: 0.75rem; }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes heartBeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }
  </style>
</head>
<body>
  <!-- Splash Screen -->
  <div class="splash-screen" id="splashScreen">
    <div class="splash-content">
      <div class="splash-icon">
        <i class="material-icons">auto_awesome</i>
      </div>
      <div class="splash-title">Ayar Yar</div>
      <div class="splash-subtitle">AI Prompts</div>
      <div class="splash-loader"></div>
    </div>
  </div>

  <div class="app-bar">
    <div class="app-bar-top">
      <h1><i class="material-icons">auto_awesome</i>Ayar Yar Prompts</h1>
      <button class="icon-btn" onclick="loadAll()">
        <i class="material-icons">refresh</i>
      </button>
    </div>
    <div class="search-bar">
      <i class="material-icons">search</i>
      <input type="text" id="searchInput" placeholder="Prompt ရှာရန်..." oninput="filterPrompts()">
    </div>
  </div>

  <div id="statusBar" class="status-bar"></div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('all', event)">All</button>
    <button class="tab" onclick="switchTab('favorites', event)">Favorites</button>
  </div>

  <div class="container">
    <div id="noticeContainer"></div>

    <div class="dev-card">
      <div class="dev-avatar">KM</div>
      <div class="dev-info">
        <div class="dev-name">Kyaw Myo Thank</div>
        <div class="dev-email">
          <i class="material-icons" style="font-size:16px;">mail</i>
          drkyawmyothank@gmail.com
        </div>
      </div>
      <i class="material-icons" style="color:var(--md-sys-color-primary);">verified</i>
    </div>

    <div id="loader" class="loader">
      <div class="spinner"></div>
      <p>Loading prompts...</p>
    </div>
    <div id="cardContainer"></div>
    <div id="emptyState" class="empty" style="display:none;"></div>
  </div>

  <div id="modalOverlay" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-card" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle"></div>
        <button class="modal-close" onclick="closeModal()">
          <i class="material-icons">close</i>
        </button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-actions">
        <button class="md-button" id="modalCopyBtn">
          <i class="material-icons" style="font-size:18px;">content_copy</i>Copy All
        </button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const BLOG_ID = 'ayaryarburmese';
    const PASTEBIN_URL = 'https://pastebin.com/raw/AqhguBVb';

    let allPosts = [];
    let currentTab = 'all';
    let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
    let postDataMap = {};
    let noticeDismissed = localStorage.getItem('noticeDismissed') === 'true';

    const statusBar = document.getElementById('statusBar');
    const loader = document.getElementById('loader');
    const cardContainer = document.getElementById('cardContainer');
    const emptyState = document.getElementById('emptyState');
    const searchInput = document.getElementById('searchInput');
    const modalOverlay = document.getElementById('modalOverlay');
    const noticeContainer = document.getElementById('noticeContainer');

    // Hide splash after 2.5s
    setTimeout(() => {
      document.getElementById('splashScreen').style.display = 'none';
    }, 2500);

    function handleBlogFeed(data) {
      allPosts = data.feed.entry || [];
      postDataMap = {};
      allPosts.forEach(post => {
        postDataMap[post.id.$t] = {
          title: post.title.$t,
          content: post.content.$t,
          link: post.link.find(l => l.rel === 'alternate').href
        };
      });
      localStorage.setItem('cachedPosts', JSON.stringify(allPosts));
      localStorage.setItem('postDataMap', JSON.stringify(postDataMap));
      loader.style.display = 'none';
      displayCards();
      showToast(`Posts ${allPosts.length} ခုရပြီ`);
    }

    async function loadNotice() {
      if (noticeDismissed) return;
      try {
        const proxyUrl = 'https://api.allorigins.win/raw?url=';
        const res = await fetch(proxyUrl + encodeURIComponent(PASTEBIN_URL));
        if (!res.ok) throw new Error('Failed');
        const notice = await res.json();
        if (notice.enabled) showNotice(notice);
      } catch (e) {
        console.log('Notice error:', e);
      }
    }

    function showNotice(data) {
      noticeContainer.innerHTML = `
        <div class="notice-card">
          <div class="notice-header">
            <div class="notice-icon"><i class="material-icons">campaign</i></div>
            <div class="notice-content">
              <div class="notice-title">${escapeHtml(data.title)}</div>
              <div class="notice-message">${escapeHtml(data.message)}</div>
            </div>
            <button class="notice-close" onclick="dismissNotice()">
              <i class="material-icons" style="font-size:20px;">close</i>
            </button>
          </div>
          ${data.buttonText? `<button class="notice-btn" onclick="window.open('${data.buttonLink}', '_blank')"><i class="material-icons" style="font-size:18px;">open_in_new</i>${escapeHtml(data.buttonText)}</button>` : ''}
        </div>
      `;
    }

    function dismissNotice() {
      noticeContainer.innerHTML = '';
      localStorage.setItem('noticeDismissed', 'true');
      noticeDismissed = true;
    }

    function loadAll() {
      loadNotice();
      loadPosts();
    }

    function loadPosts() {
      if (!navigator.onLine) {
        statusBar.className = 'status-bar status-offline';
        statusBar.innerHTML = '<i class="material-icons" style="font-size:18px;">wifi_off</i><span>Offline</span>';
        loadFromCache();
        return;
      }

      statusBar.className = 'status-bar status-online';
      statusBar.innerHTML = '<i class="material-icons" style="font-size:18px;">wifi</i><span>Online</span>';
      loader.style.display = 'block';
      cardContainer.innerHTML = '';
      emptyState.style.display = 'none';

      const oldScript = document.getElementById('blogScript');
      if (oldScript) oldScript.remove();

      const script = document.createElement('script');
      script.id = 'blogScript';
      script.src = `https://${BLOG_ID}.blogspot.com/feeds/posts/default?alt=json-in-script&callback=handleBlogFeed&max-results=50`;
      script.onerror = () => {
        loader.style.display = 'none';
        showToast('Blog မချိတ်နိုင်ပါ');
        loadFromCache();
      };
      document.body.appendChild(script);
    }

    function loadFromCache() {
      const cached = localStorage.getItem('cachedPosts');
      const cachedMap = localStorage.getItem('postDataMap');
      if (cached)
